<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1, h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th {
            background: #007bff;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Encuesta de Salud</h1>

        <form id="formEncuesta">

            <!-- Edad -->
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" min="1" max="120" required>

            <!-- Peso -->
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" name="peso" min="1" max="300" required>

            <!-- Nivel de dolor -->
            <label for="dolor">Nivel de dolor:</label>
            <input type="range" id="dolor" name="dolor" min="0" max="10">

            <!-- Tipo de sangre -->
            <label for="sangre">Tipo de sangre:</label>
            <select id="sangre" name="sangre" required>
                <option value="">Seleccione</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>
            </select>

            <button type="submit">Enviar</button>

        </form>

        <!-- TABLA -->
        <h2>Resultados de la Encuesta</h2>

        <table>
            <thead>
                <tr>
                    <th>Edad</th>
                    <th>Peso</th>
                    <th>Nivel Dolor</th>
                    <th>Tipo Sangre</th>
                </tr>
            </thead>
            <tbody id="resultados">
                <!-- Las filas se agregarán aquí dinámicamente -->
            </tbody>
        </table>

    </div>

    <script>
        // Seleccionamos el formulario y el tbody
        const form = document.getElementById('formEncuesta');
        const tableBody = document.getElementById('resultados');

        form.addEventListener('submit', function(event) {
            event.preventDefault(); // Evita recarga de la página

            // Obtener valores del formulario
            const edad = document.getElementById('edad').value;
            const peso = document.getElementById('peso').value;
            const dolor = document.getElementById('dolor').value;
            const sangre = document.getElementById('sangre').value;

            if(!edad || !peso || !sangre) return; // Evita registros incompletos

            // Crear nueva fila
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td>${edad}</td>
                <td>${peso} kg</td>
                <td>${dolor}</td>
                <td>${sangre}</td>
            `;

            // Agregar fila a la tabla
            tableBody.appendChild(newRow);

            // Limpiar formulario para un nuevo registro
            form.reset();
        });
    </script>

</body>
</html>
