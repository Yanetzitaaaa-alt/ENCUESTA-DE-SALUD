<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1, h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th {
            background: #007bff;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Encuesta de Salud</h1>

        <form>

            <!-- Edad -->
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" min="1" max="120" required>

            <!-- Peso -->
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" name="peso" min="1" max="300" required>

            <!-- Nivel de dolor -->
            <label for="dolor">Nivel de dolor:</label>
            <input type="range" id="dolor" name="dolor" min="0" max="10">

            <!-- Tipo de sangre -->
            <label for="sangre">Tipo de sangre:</label>
            <select id="sangre" name="sangre" required>
                <option value="">Seleccione</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>
            </select>

            <button type="submit">Enviar</button>

        </form>

        <!-- TABLA -->
        <h2>Resultados de la Encuesta</h2>

        <table>

            <thead>
                <tr>
                    <th>Edad</th>
                    <th>Peso</th>
                    <th>Nivel Dolor</th>
                    <th>Tipo Sangre</th>
                </tr>
            </thead>

            <tbody>
              </tbody>
</table>

<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault(); // EVITA QUE SE RECARGUE LA PÁGINA

    let edad = document.getElementById("edad").value;
    let peso = document.getElementById("peso").value;
    let dolor = document.getElementById("nivel de dolor").value;
    let sangre = document.getElementById("tipo de sangre").value;
    
    let tabla = document.getElementById("tabla").getElementsByTagName("tbody")[0];

    let fila = tabla.insertRow();

    fila.insertCell(0).textContent = edad;
    fila.insertCell(1).textContent = peso;
    fila.insertCell(2).textContent = nivel de dolor;
    fila.insertCell(3).textContent = tipo de sangre;

    // Limpia el formulario
    document.getElementById("formulario").reset();
});
</script>

</body>
</html>
