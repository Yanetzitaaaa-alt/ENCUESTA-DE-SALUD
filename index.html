<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h2>📋 Formulario de Encuesta de Salud</h2>

    <form action="#">
        <!-- Número de identificación o edad con rango -->
        <div class="form-group">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" min="1" max="120" required>
        </div>

        <!-- Nivel de dolor con control deslizante -->
        <div class="form-group">
            <label for="dolor">Nivel de dolor (0 = Nada, 10 = Insoportable):</label>
            <input type="range" id="dolor" name="dolor" min="0" max="10" value="0" 
                   oninput="document.getElementById('valorDolor').innerText = this.value">
            <p>Valor seleccionado: <span id="valorDolor">0</span></p>
        </div>

        <!-- Tipo de sangre con menú desplegable -->
        <div class="form-group">
            <label for="sangre">Tipo de sangre:</label>
            <select id="sangre" name="sangre" required>
                <option value="">Seleccione...</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>
        </div>

        <button type="submit">Enviar</button>
    </form>

</body>
</html>
